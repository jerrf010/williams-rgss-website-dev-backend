name: Docker Package

on:
  pull_request:
    paths:
      - ".github/workflows/docker-package.yml"
      - ".dockerignore"
      - "backend/**"
      - "requirements.txt"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docker-package.yml"
      - ".dockerignore"
      - "backend/**"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/backend

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Generate settings_local.py
        run: cp backend/backend/settings_prod.py backend/backend/settings_local.py

      - name: Generate entrypoint.sh
        run: |
          cat > backend/entrypoint.sh << 'EOF'
          #!/bin/sh
          set -e

          echo "==> Running migration fixer..."
          python manage.py migrate_or_fix --no-input

          echo "==> Running migrations..."
          python manage.py migrate --no-input

          echo "==> Collecting static files..."
          python manage.py collectstatic --no-input --clear

          echo "==> Starting gunicorn..."
          exec gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
          EOF
          chmod +x backend/entrypoint.sh

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}