services:
  backend:
    image: ghcr.io/rgss-cs/backend:latest
    container_name: backend
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internetwork
      - backend-net
    pull_policy: always

  db:
    image: postgres:17-alpine
    container_name: backend-postgresql
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  nginx:
    image: nginx:alpine
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:

networks:
  internetwork:
      external: true
  backend-net:
    driver: bridge
